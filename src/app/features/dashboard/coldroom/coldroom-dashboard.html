<div class="coldroom-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Cámaras de Frío</h1>
      <span class="page-subtitle">Gestión de cámaras frigoríficas para almacenamiento de canales</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nueva Cámara
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar cámara</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, código o ubicación..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredColdRooms().length }} resultado(s)</span>
  </div>

  <app-coldroom-table
    [data]="filteredColdRooms()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
