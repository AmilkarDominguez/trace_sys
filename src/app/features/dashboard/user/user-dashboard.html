<div class="user-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Usuarios</h1>
      <span class="page-subtitle">Gestión de usuarios con acceso al sistema de trazabilidad</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>person_add</mat-icon>
      Nuevo Usuario
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar usuario</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, usuario, correo o rol..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredUsers().length }} resultado(s)</span>
  </div>

  <app-user-table
    [data]="filteredUsers()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
