<div class="label-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Etiquetas</h1>
      <span class="page-subtitle">Registro y trazabilidad de etiquetas de canal (Etiqueta 1, 2 y 3)</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>qr_code_2</mat-icon>
      Nueva Etiqueta
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar etiqueta</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Código, animal, canal, lote, ganadero..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredLabels().length }} resultado(s)</span>
  </div>

  <app-label-table
    [data]="filteredLabels()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (print)="onPrint($event)"
    (delete)="onDelete($event)"
  />

</div>
