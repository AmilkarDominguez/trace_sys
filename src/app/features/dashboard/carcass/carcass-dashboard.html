<div class="carcass-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Canales</h1>
      <span class="page-subtitle">Inventario y trazabilidad de canales en cámara y despacho</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nueva Canal
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar canal</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Código, etiqueta, lote, ganadero, cámara..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredCarcasses().length }} resultado(s)</span>
  </div>

  <app-carcass-table
    [data]="filteredCarcasses()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
