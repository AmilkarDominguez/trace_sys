<div class="role-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Roles</h1>
      <span class="page-subtitle">Gestión de roles y permisos de acceso al sistema</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nuevo Rol
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar rol</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, código o descripción..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredRoles().length }} resultado(s)</span>
  </div>

  <app-role-table
    [data]="filteredRoles()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
