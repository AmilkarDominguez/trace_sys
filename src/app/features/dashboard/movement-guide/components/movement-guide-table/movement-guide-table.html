<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" matSort class="guide-table">

    <ng-container matColumnDef="guideNumber">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>N.° Guía</th>
      <td mat-cell *matCellDef="let row">
        <span class="guide-number">{{ row.guideNumber }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="rancher">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Ganadero</th>
      <td mat-cell *matCellDef="let row">{{ row.rancher }}</td>
    </ng-container>

    <ng-container matColumnDef="carrier">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Transportista</th>
      <td mat-cell *matCellDef="let row">{{ row.carrier }}</td>
    </ng-container>

    <ng-container matColumnDef="vehiclePlate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Placa</th>
      <td mat-cell *matCellDef="let row">
        <span class="plate-badge">{{ row.vehiclePlate }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="animalCount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-center">Animales</th>
      <td mat-cell *matCellDef="let row" class="col-center">{{ row.animalCount }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span class="status-chip" [class]="statusClass(row.status)">
          {{ statusLabel(row.status) }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="issueDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha Emisión</th>
      <td mat-cell *matCellDef="let row">{{ row.issueDate | date:'dd/MM/yyyy' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Acciones</th>
      <td mat-cell *matCellDef="let row" class="col-actions">
        <button mat-icon-button matTooltip="Ver detalle" (click)="view.emit(row)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Editar" (click)="edit.emit(row)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Eliminar" color="warn" (click)="delete.emit(row)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-mdc-row" *matNoDataRow>
      <td [colSpan]="displayedColumns.length" class="no-data">No se encontraron guías de movimiento.</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
</div>
