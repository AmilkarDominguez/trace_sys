<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" matSort class="carrier-table">

    <!-- Column: businessName -->
    <ng-container matColumnDef="businessName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre / Razón Social</th>
      <td mat-cell *matCellDef="let row" class="cell-name">{{ row.businessName }}</td>
    </ng-container>

    <!-- Column: vehiclePlate -->
    <ng-container matColumnDef="vehiclePlate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Placa</th>
      <td mat-cell *matCellDef="let row">
        <span class="plate-badge">{{ row.vehiclePlate }}</span>
      </td>
    </ng-container>

    <!-- Column: phone -->
    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let row">{{ row.phone }}</td>
    </ng-container>

    <!-- Column: isActive -->
    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span class="status-badge" [class.status-active]="row.isActive" [class.status-inactive]="!row.isActive">
          {{ row.isActive ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    <!-- Column: actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Acciones</th>
      <td mat-cell *matCellDef="let row" class="col-actions">
        <button mat-icon-button color="primary" matTooltip="Ver detalle" (click)="view.emit(row)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Editar" (click)="edit.emit(row)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="delete.emit(row)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

    <tr class="mat-mdc-row" *matNoDataRow>
      <td class="no-data-cell" [attr.colspan]="displayedColumns.length">
        <mat-icon>search_off</mat-icon>
        <span>No se encontraron transportistas</span>
      </td>
    </tr>

  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 25]"
    [pageSize]="10"
    showFirstLastButtons
    aria-label="Paginación de transportistas">
  </mat-paginator>
</div>
