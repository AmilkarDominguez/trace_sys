<div class="carrier-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Transportistas</h1>
      <span class="page-subtitle">Catálogo de transportistas habilitados para el traslado de ganado</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nuevo Transportista
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar transportista</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, NIT, placa, correo o teléfono..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredCarriers().length }} resultado(s)</span>
  </div>

  <app-carrier-table
    [data]="filteredCarriers()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
