<div class="rancher-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Ganaderos</h1>
      <span class="page-subtitle">Catálogo de ganaderos y clientes del sistema</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>person_add</mat-icon>
      Nuevo Ganadero
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar ganadero</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, NIT, correo o teléfono..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredRanchers().length }} resultado(s)</span>
  </div>

  <app-rancher-table
    [data]="filteredRanchers()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
