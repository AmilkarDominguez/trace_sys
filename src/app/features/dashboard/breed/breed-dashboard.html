<div class="breed-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Razas</h1>
      <span class="page-subtitle">Catálogo de razas ganaderas registradas en el sistema</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nueva Raza
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar raza</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, origen o descripción..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredBreeds().length }} resultado(s)</span>
  </div>

  <app-breed-table
    [data]="filteredBreeds()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
