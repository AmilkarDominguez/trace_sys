<div class="slaughter-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Registros de Faena</h1>
      <span class="page-subtitle">Gestión y trazabilidad del proceso de faena (producción)</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nuevo Registro
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar registro</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="N° registro, etiqueta, lote, ganadero..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredRecords().length }} resultado(s)</span>
  </div>

  <app-slaughter-record-table
    [data]="filteredRecords()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
