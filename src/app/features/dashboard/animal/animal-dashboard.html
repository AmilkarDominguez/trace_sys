<div class="animal-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Animales en Corrales</h1>
      <span class="page-subtitle">Registro individual de animales ingresados a planta</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nuevo Animal
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar animal</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Arete, lote, ganadero, raza, corral o estado..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredAnimals().length }} resultado(s)</span>
  </div>

  <app-animal-table
    [data]="filteredAnimals()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
