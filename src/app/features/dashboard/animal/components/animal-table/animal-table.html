<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" matSort class="animal-table">

    <ng-container matColumnDef="tag">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Arete / Tag</th>
      <td mat-cell *matCellDef="let row">
        <span class="tag-code">{{ row.tag }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="lotNumber">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Lote</th>
      <td mat-cell *matCellDef="let row">
        <span class="lot-code">{{ row.lotNumber }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="rancher">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Ganadero</th>
      <td mat-cell *matCellDef="let row">{{ row.rancher }}</td>
    </ng-container>

    <ng-container matColumnDef="breed">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Raza</th>
      <td mat-cell *matCellDef="let row">{{ row.breed }}</td>
    </ng-container>

    <ng-container matColumnDef="pen">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Corral</th>
      <td mat-cell *matCellDef="let row">{{ row.pen }}</td>
    </ng-container>

    <ng-container matColumnDef="entryWeight">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="col-right">Peso Entrada (kg)</th>
      <td mat-cell *matCellDef="let row" class="col-right">{{ row.entryWeight }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span class="status-chip" [class]="statusClass(row.status)">
          {{ statusLabel(row.status) }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Acciones</th>
      <td mat-cell *matCellDef="let row" class="col-actions">
        <button mat-icon-button matTooltip="Ver detalle" (click)="view.emit(row)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Editar" (click)="edit.emit(row)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Eliminar" color="warn" (click)="delete.emit(row)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-mdc-row" *matNoDataRow>
      <td [colSpan]="displayedColumns.length" class="no-data">No se encontraron animales registrados.</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
</div>
